<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}LitePanel{% endblock %}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0a1628 0%, #0d2144 50%, #0a1628 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .login-card {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    width: 400px;
    padding: 40px 36px 32px;
  }

  .logo-area {
    text-align: center;
    margin-bottom: 24px;
  }

  .logo-area .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #1a6fc4, #0d4a8a);
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
  }

  .logo-area .logo-icon svg { width: 32px; height: 32px; fill: #fff; }

  .logo-area h1 {
    font-size: 22px;
    font-weight: 700;
    color: #0d2144;
    letter-spacing: -0.3px;
  }

  .login-type {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 28px;
    padding: 6px 14px;
    border-radius: 20px;
    display: inline-block;
    width: 100%;
  }

  .divider {
    height: 1px;
    background: #e5e9f0;
    margin-bottom: 24px;
  }

  .form-group { margin-bottom: 18px; }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
  }

  .form-group input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 6px;
    font-size: 14px;
    color: #111827;
    transition: border-color 0.2s;
    outline: none;
  }

  .form-group input:focus { border-color: #1a6fc4; }

  .btn-login {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .btn-login:hover { opacity: 0.9; }

  .error-msg {
    margin-top: 14px;
    padding: 10px 14px;
    background: #fef2f2;
    border: 1px solid #fca5a5;
    border-radius: 6px;
    color: #b91c1c;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: #9ca3af;
  }

  @media (max-width: 480px) {
    .login-card { width: 100%; min-height: 100vh; border-radius: 0; padding: 40px 24px; }
  }

  {% block extra_styles %}{% endblock %}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1>LitePanel</h1>
  </div>

  {% block login_badge %}{% endblock %}
  <div class="divider"></div>

  <form method="post" action="">
    {% csrf_token %}
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username"
             autofocus required placeholder="Enter username">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password"
             required placeholder="Enter password">
    </div>
    <button type="submit" class="btn-login {% block btn_class %}{% endblock %}">
      {% block btn_label %}Log In{% endblock %}
    </button>
  </form>

  {% if error %}
  <div class="error-msg">
    <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
    </svg>
    {{ error }}
  </div>
  {% endif %}

  <div class="card-footer">LitePanel v{{ panel_version }}</div>
</div>
</body>
</html>
